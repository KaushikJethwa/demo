name: Deploy Spring Boot via SSH
description: Secure Spring Boot deployment to DigitalOcean droplet

inputs:
  host:
    description: Server IP
    required: true
  user:
    description: SSH User
    required: true
  key:
    description: SSH Private Key
    required: true
  target:
    description: Target directory on server
    required: true
  do_token:
    description: DigitalOcean API Token
    required: true
  firewall_id:
    description: Firewall ID
    required: true

runs:
  using: "composite"

  steps:

    # ---------------------------------------------------
    # 1пёЏвѓЈ Get GitHub Runner Public IP
    # ---------------------------------------------------
    - name: Get Runner IP
      id: runner_ip
      shell: bash
      run: |
        IP=$(curl -s https://checkip.amazonaws.com || curl -s https://ifconfig.me)

        if [[ ! $IP =~ ^[0-9]+\.[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "вќЊ Invalid IP detected: $IP"
          exit 1
        fi

        echo "Runner IP: $IP"
        echo "ip=$IP" >> $GITHUB_OUTPUT


    # ---------------------------------------------------
    # 2пёЏвѓЈ Install doctl
    # ---------------------------------------------------
    - name: Install doctl
      uses: digitalocean/action-doctl@v2
      with:
        token: ${{ inputs.do_token }}


    # ---------------------------------------------------
    # 3пёЏвѓЈ Open Firewall for SSH
    # ---------------------------------------------------
    - name: Open Firewall Access
      shell: bash
      run: |
        echo "Opening firewall for ${{ steps.runner_ip.outputs.ip }}"
        doctl compute firewall add-rules ${{ inputs.firewall_id }} \
          --inbound-rules "protocol:tcp,ports:22,address:${{ steps.runner_ip.outputs.ip }}/32"


    # ---------------------------------------------------
    # 4пёЏвѓЈ Build Spring Boot JAR
    # ---------------------------------------------------
    - name: Build JAR
      shell: bash
      run: |
        mvn clean package -DskipTests


    # ---------------------------------------------------
    # 5пёЏвѓЈ Copy JAR to Server
    # ---------------------------------------------------
    - name: Copy JAR to Server
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        key: ${{ inputs.key }}
        source: "target/*.jar"
        target: "${{ inputs.target }}"


    # ---------------------------------------------------
    # 6пёЏвѓЈ Deploy on Server
    # ---------------------------------------------------
    - name: Deploy Spring Boot
      uses: appleboy/ssh-action@v1.2.0
      with:
        host: ${{ inputs.host }}
        username: ${{ inputs.user }}
        key: ${{ inputs.key }}
        script: |
          set -e

          echo "----------------------------------------"
          echo "рџљЂ SPRING BOOT DEPLOYMENT STARTED"
          echo "----------------------------------------"

          cd ${{ inputs.target }}

          # Stop old app
          echo "рџ›‘ Stopping old app..."
          if pgrep -f "java -jar" > /dev/null; then
          pkill -f "java -jar" || true
          echo "Old app stopped"
          else
          echo "No running app found"
          fi

          # Prepare new JAR
          echo "рџ“¦ Preparing new JAR..."
          if ls target/*.jar 1> /dev/null 2>&1; then
            mv target/*.jar app.jar
          else
            mv *.jar app.jar
          fi

          # Start app
          echo "рџ”„ Restarting Spring Boot service..."
          sudo systemctl restart springboot

          echo "----------------------------------------"
          echo "вњ… DEPLOYMENT SUCCESSFUL"
          echo "----------------------------------------"


    # ---------------------------------------------------
    # 7пёЏвѓЈ Always Close Firewall
    # ---------------------------------------------------
    - name: Close Firewall Access
      if: always()
      shell: bash
      run: |
        if [[ -n "${{ steps.runner_ip.outputs.ip }}" ]]; then
          echo "Closing firewall for ${{ steps.runner_ip.outputs.ip }}"
          doctl compute firewall remove-rules ${{ inputs.firewall_id }} \
            --inbound-rules "protocol:tcp,ports:22,address:${{ steps.runner_ip.outputs.ip }}/32"
        fi